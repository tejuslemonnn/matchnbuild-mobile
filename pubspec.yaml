name: mnb_mobile
description: "MnB: MatchNBuild - A Flutter mobile application."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  photo_view: ^0.15.0
  flutter_slidable: ^3.1.2
  dotted_border: ^2.1.0
  flutter_colorpicker: ^1.1.0
  flutter_dropdown_alert: ^1.0.7
  jumping_dot: ^0.0.7
  wheel_picker: ^0.2.2
  font_awesome_flutter: ^10.8.0
  persistent_bottom_nav_bar_v2: ^5.3.1
  form_builder_validators: ^11.1.1

  # State Management
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation & DI
  flutter_modular: ^6.3.4

  # Network
  dio: ^5.8.0+1
  http: ^1.3.0
  http_parser: ^4.1.2
  pretty_dio_logger: ^1.4.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.0
  path_provider: ^2.1.5

  # Utils
  dartz: ^0.10.1
  rxdart: ^0.28.0
  collection: ^1.19.1
  intl: any
  jwt_decoder: ^2.0.1
  mime: ^2.0.0
  formz: ^0.8.0
  synchronized: ^3.3.0+3

  # Environment
  flutter_dotenv: ^5.2.1

  # Code Generation
  json_annotation: ^4.9.0
  google_fonts: ^8.0.2
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  rename: ^3.1.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/png/
    - assets/svg/
